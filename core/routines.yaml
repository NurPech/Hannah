routines:
  - name: "Nachtlicht"
    triggers:
      - "nachtlicht"
      - "nacht licht"
    reply: "Nachtlicht aktiviert."
    actions:
      - topic: "hannah/set/devices/Licht/EG/Schlafzimmer/Bett/Nachtlicht"
        value: "true"

  - name: "Gute Nacht"
    triggers:
      - "gute nacht"
      - "schlafenszeit"
    reply: "Gute Nacht."
    actions:
      - topic: "hannah/set/devices/Licht/EG/Schlafzimmer/Bett/Nachtlicht"
        value: "true"
      - topic: "hannah/set/devices/Licht/EG/Flur/on"
        value: "false"

  - name: "Regenbogen"
    triggers:
      - "regenbogen"
    reply: "Regenbogen-Modus aktiviert."
    actions:
      - topic: "hannah/set/devices/Licht/EG/Schlafzimmer/Bett/Regenbogen"
        value: "true"
