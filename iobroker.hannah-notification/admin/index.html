<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Hannah Notification</title>
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css" />
    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>
</head>
<body>
<div class="m adapter-container">
    <div class="row">
        <div class="col s12 m6">
            <label for="mqtt_broker">MQTT Broker (Host/IP)</label>
            <input type="text" id="mqtt_broker" class="value" />
        </div>
        <div class="col s12 m2">
            <label for="mqtt_port">MQTT Port</label>
            <input type="number" id="mqtt_port" class="value" min="1" max="65535" />
        </div>
    </div>
    <div class="row">
        <div class="col s12 m6">
            <label for="mqtt_user">Benutzername</label>
            <input type="text" id="mqtt_user" class="value" />
        </div>
        <div class="col s12 m6">
            <label for="mqtt_pass">Passwort</label>
            <input type="password" id="mqtt_pass" class="value" />
        </div>
    </div>
    <div class="row">
        <div class="col s12 m6">
            <label for="hannah_topic">Hannah MQTT Topic</label>
            <input type="text" id="hannah_topic" class="value" />
        </div>
    </div>
</div>
<script>
    function load(settings, onChange) {
        if (!settings) return;
        $('.value').each(function() {
            var $this = $(this);
            if ($this.attr('type') === 'checkbox') {
                $this.prop('checked', settings[$this.attr('id')]);
            } else {
                $this.val(settings[$this.attr('id')] !== undefined ? settings[$this.attr('id')] : '');
            }
            $this.on('change', onChange);
        });
    }
    function save(callback) {
        var obj = {};
        $('.value').each(function() {
            var $this = $(this);
            if ($this.attr('type') === 'checkbox') {
                obj[$this.attr('id')] = $this.prop('checked');
            } else if ($this.attr('type') === 'number') {
                obj[$this.attr('id')] = parseInt($this.val(), 10) || 0;
            } else {
                obj[$this.attr('id')] = $this.val();
            }
        });
        callback(obj);
    }
</script>
</body>
</html>
